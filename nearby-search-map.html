<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NearMe — Discover Places Around You</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --card: #1c1c27; --border: #2a2a3a;
    --accent: #ff3b3b; --accent-glow: rgba(255,59,59,0.25); --accent-soft: rgba(255,59,59,0.12);
    --text: #f0f0f8; --muted: #7b7b99; --green: #22c55e; --r: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden; }

  /* SPLASH */
  #splash { position:fixed; inset:0; background:var(--bg); display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:9999; transition:opacity .4s; }
  #splash.fade { opacity:0; pointer-events:none; }
  .splash-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem;
    color:#fff; letter-spacing:-.04em; }
  .splash-logo span { color:var(--accent); }
  .splash-spinner { width:34px; height:34px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  .splash-note { font-size:.82rem; color:var(--muted); }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* APP SHELL */
  #app { display:none; flex-direction:column; height:100%; }

  /* HEADER */
  .header { display:flex; align-items:center; gap:12px; padding:14px 20px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:100; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem;
    letter-spacing:-.03em; color:#fff; white-space:nowrap; }
  .logo span { color:var(--accent); }
  .search-bar { flex:1; display:flex; align-items:center; gap:10px;
    background:var(--card); border:1.5px solid var(--border); border-radius:12px;
    padding:0 14px; transition:border-color .2s,box-shadow .2s; }
  .search-bar:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .search-bar svg { color:var(--muted); flex-shrink:0; }
  .search-bar input { flex:1; background:none; border:none; outline:none; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:.95rem; padding:11px 0; }
  .search-bar input::placeholder { color:var(--muted); }
  .btn-search { background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:9px 18px; font-family:'Syne',sans-serif; font-weight:600; font-size:.88rem;
    cursor:pointer; white-space:nowrap; transition:background .2s,transform .1s,box-shadow .2s; }
  .btn-search:hover { background:#e02020; box-shadow:0 4px 20px var(--accent-glow); }
  .btn-search:active { transform:scale(.97); }
  .btn-locate { background:var(--card); border:1.5px solid var(--border); border-radius:10px;
    padding:9px 12px; cursor:pointer; color:var(--muted); display:flex; align-items:center;
    transition:border-color .2s,color .2s; }
  .btn-locate:hover { border-color:var(--accent); color:var(--accent); }

  /* RADIUS ROW */
  .radius-row { display:flex; align-items:center; gap:8px; padding:9px 20px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
  .radius-row::-webkit-scrollbar { display:none; }
  .radius-label { font-size:.72rem; font-weight:500; color:var(--muted); white-space:nowrap;
    text-transform:uppercase; letter-spacing:.08em; margin-right:4px; }
  .radius-pill { background:var(--card); border:1.5px solid var(--border); color:var(--muted);
    border-radius:999px; padding:4px 13px; font-size:.81rem; font-weight:500;
    cursor:pointer; white-space:nowrap; transition:all .15s; }
  .radius-pill.active,.radius-pill:hover { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

  /* CHIPS */
  .suggestions { display:flex; gap:6px; flex-wrap:wrap; padding:8px 20px 10px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .chip { background:var(--card); border:1.5px solid var(--border); border-radius:999px;
    padding:4px 12px; font-size:.79rem; color:var(--muted); cursor:pointer; transition:all .15s; }
  .chip:hover { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

  /* MAIN */
  .main { display:flex; flex:1; overflow:hidden; position:relative; min-height:0; }
  #map { flex:1; z-index:1; }
  .leaflet-tile { filter:brightness(.82) saturate(.85); }

  /* PANEL */
  .panel { width:300px; background:var(--surface); border-left:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; z-index:10; }
  .panel-header { padding:14px 18px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; }
  .panel-title { font-family:'Syne',sans-serif; font-weight:700; font-size:.95rem; }
  .result-count { font-size:.78rem; color:var(--muted); background:var(--card);
    border-radius:999px; padding:2px 10px; }
  .panel-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .panel-list::-webkit-scrollbar { width:3px; }
  .panel-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .place-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--r);
    padding:12px 14px; cursor:pointer; transition:border-color .2s,transform .15s,box-shadow .2s; }
  .place-card:hover,.place-card.active { border-color:var(--accent); transform:translateX(-3px);
    box-shadow:4px 0 16px var(--accent-glow); }
  .place-top { display:flex; align-items:flex-start; gap:10px; }
  .place-icon { width:34px; height:34px; border-radius:9px; background:var(--accent-soft);
    border:1.5px solid var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .place-name { font-family:'Syne',sans-serif; font-weight:600; font-size:.88rem; line-height:1.3; }
  .place-addr { font-size:.75rem; color:var(--muted); margin-top:3px; line-height:1.4; }
  .place-dist { margin-top:7px; font-size:.74rem; color:var(--accent); font-weight:500;
    display:flex; align-items:center; gap:4px; }
  .panel-empty { flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:28px 18px; text-align:center; color:var(--muted); gap:10px; }
  .panel-empty .big { font-size:2rem; }
  .panel-empty p { font-size:.83rem; line-height:1.55; }
  .panel-empty strong { color:var(--text); }

  /* STATUS BAR */
  .status-bar { position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--surface); border:1.5px solid var(--border); border-radius:999px;
    padding:7px 18px; font-size:.8rem; color:var(--muted); display:flex; align-items:center;
    gap:8px; z-index:50; white-space:nowrap; box-shadow:0 4px 24px rgba(0,0,0,.45);
    pointer-events:none; opacity:0; transition:opacity .3s; }
  .status-bar.visible { opacity:1; }
  .sdot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
  .sdot.loading { background:#f59e0b; }
  .sdot.error { background:var(--accent); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* POPUP */
  .leaflet-popup-content-wrapper { background:var(--card)!important; border:1.5px solid var(--accent)!important;
    border-radius:12px!important; box-shadow:0 8px 32px var(--accent-glow)!important; color:var(--text)!important; }
  .leaflet-popup-tip { background:var(--card)!important; }
  .leaflet-popup-content { margin:12px 16px!important; }
  .pname { font-family:'Syne',sans-serif; font-weight:700; font-size:.92rem; margin-bottom:4px; }
  .paddr { font-size:.78rem; color:var(--muted); line-height:1.4; }
  .pdist { font-size:.78rem; color:var(--accent); margin-top:6px; font-weight:500; }

  @media(max-width:600px){ .panel{display:none;} .logo{display:none;} }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">Near<span>Me</span></div>
  <div class="splash-spinner"></div>
  <div class="splash-note" id="splash-note">Loading map library…</div>
</div>

<div id="app">
  <div class="header">
    <div class="logo">Near<span>Me</span></div>
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder='e.g. "salon", "cafe", "gym"…' value="salon"/>
    </div>
    <button class="btn-search" id="btn-search">Search</button>
    <button class="btn-locate" id="btn-locate" title="Re-center to my location">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="radius-row">
    <span class="radius-label">Radius</span>
    <button class="radius-pill" data-km="0.5">500 m</button>
    <button class="radius-pill active" data-km="1">1 km</button>
    <button class="radius-pill" data-km="2">2 km</button>
    <button class="radius-pill" data-km="5">5 km</button>
    <button class="radius-pill" data-km="10">10 km</button>
  </div>

  <div class="suggestions">
    <button class="chip" data-q="salon">✂️ Salon</button>
    <button class="chip" data-q="cafe">☕ Cafe</button>
    <button class="chip" data-q="pharmacy">💊 Pharmacy</button>
    <button class="chip" data-q="restaurant">🍽️ Restaurant</button>
    <button class="chip" data-q="gym">🏋️ Gym</button>
    <button class="chip" data-q="hospital">🏥 Hospital</button>
  </div>

  <div class="main">
    <div id="map"></div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="panel-title">Results</span>
        <span class="result-count" id="result-count">–</span>
      </div>
      <div class="panel-list" id="panel-list">
        <div class="panel-empty">
          <div class="big">🔍</div>
          <p><strong>Search for a place</strong><br>Type above and hit Search to find nearby spots.</p>
        </div>
      </div>
    </div>
    <div class="status-bar" id="status-bar">
      <div class="sdot" id="sdot"></div>
      <span id="stext">Ready</span>
    </div>
  </div>
</div>

<script>
// ── 1. Dynamically load Leaflet, THEN run all app logic ──────────────────────
(function () {
  var leafletCSS = document.createElement('link');
  leafletCSS.rel = 'stylesheet';
  leafletCSS.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(leafletCSS);

  var leafletJS = document.createElement('script');
  leafletJS.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';

  leafletJS.onload = function () { initApp(); };

  leafletJS.onerror = function () {
    document.getElementById('splash-note').textContent =
      'Could not load map library. Check your connection.';
  };

  document.head.appendChild(leafletJS);
})();

// ── 2. All state & logic scoped inside initApp — L guaranteed defined ────────
function initApp () {
  // Show app, fade splash
  var splash = document.getElementById('splash');
  var app    = document.getElementById('app');
  splash.classList.add('fade');
  setTimeout(function () { splash.style.display = 'none'; }, 450);
  app.style.display = 'flex';

  // ── State ──────────────────────────────────────────────────────────────────
  var map           = null;
  var userLocation  = null;   // { lat, lng } or null
  var userMarker    = null;
  var radiusCircle  = null;
  var placeMarkers  = [];
  var currentRadius = 1000;   // metres
  var currentResults = [];
  var statusTimer   = null;

  // ── Map ────────────────────────────────────────────────────────────────────
  map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  // ── Icon factories ─────────────────────────────────────────────────────────
  function redIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:26px;height:26px;background:#ff3b3b;border:3px solid #fff;' +
            'border-radius:50% 50% 50% 0;transform:rotate(-45deg);' +
            'box-shadow:0 4px 14px rgba(255,59,59,.6);"></div>',
      iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -28]
    });
  }
  function blueIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;background:#3b82f6;border:3px solid #fff;' +
            'border-radius:50%;box-shadow:0 0 0 6px rgba(59,130,246,.25);"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -12]
    });
  }

  // ── Status ─────────────────────────────────────────────────────────────────
  function showStatus(text, type) {
    var bar = document.getElementById('status-bar');
    var dot = document.getElementById('sdot');
    var txt = document.getElementById('stext');
    txt.textContent = text;
    dot.className = 'sdot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
    bar.classList.add('visible');
    if (statusTimer) clearTimeout(statusTimer);
    if (type !== 'loading') {
      statusTimer = setTimeout(function () { bar.classList.remove('visible'); }, 3200);
    }
  }

  // ── Geolocation ────────────────────────────────────────────────────────────
  function getLocation() {
    return new Promise(function (resolve, reject) {
      if (!navigator.geolocation) { reject(new Error('no-geo')); return; }
      showStatus('Detecting your location…', 'loading');
      navigator.geolocation.getCurrentPosition(
        function (p) { resolve({ lat: p.coords.latitude, lng: p.coords.longitude }); },
        function (e) { reject(e); },
        { timeout: 12000, enableHighAccuracy: true }
      );
    });
  }

  function placeUserMarker(lat, lng) {
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lng], { icon: blueIcon(), zIndexOffset: 1000 })
      .addTo(map)
      .bindPopup('<div class="pname">📍 You are here</div>');
  }

  function placeRadiusCircle(lat, lng, r) {
    if (radiusCircle) map.removeLayer(radiusCircle);
    radiusCircle = L.circle([lat, lng], {
      radius: r, color: '#ff3b3b', fillColor: '#ff3b3b',
      fillOpacity: 0.05, weight: 1.5, dashArray: '6 4'
    }).addTo(map);
  }

  // ── Haversine ──────────────────────────────────────────────────────────────
  function haversine(la1, lo1, la2, lo2) {
    var R = 6371000;
    var dLa = (la2 - la1) * Math.PI / 180;
    var dLo = (lo2 - lo1) * Math.PI / 180;
    var a = Math.sin(dLa/2) * Math.sin(dLa/2) +
            Math.cos(la1*Math.PI/180) * Math.cos(la2*Math.PI/180) *
            Math.sin(dLo/2) * Math.sin(dLo/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function fmtDist(m) {
    return m < 1000 ? (Math.round(m) + ' m away') : ((m/1000).toFixed(1) + ' km away');
  }

  // ── Nominatim search ───────────────────────────────────────────────────────
  function searchNearby(lat, lng, query, radiusM) {
    var R = 6371000;
    var dLat = (radiusM / R) * (180 / Math.PI);
    var dLng = dLat / Math.cos(lat * Math.PI / 180);
    var url = 'https://nominatim.openstreetmap.org/search?' +
      'q=' + encodeURIComponent(query) +
      '&format=json&limit=40&addressdetails=1' +
      '&viewbox=' + (lng-dLng) + ',' + (lat-dLat) + ',' + (lng+dLng) + ',' + (lat+dLat) +
      '&bounded=1';
    return fetch(url, { headers: { 'Accept-Language': 'en' } })
      .then(function (res) {
        if (!res.ok) throw new Error('search-failed');
        return res.json();
      })
      .then(function (data) {
        return data
          .map(function (item) {
            return Object.assign({}, item, { dist: haversine(lat, lng, +item.lat, +item.lon) });
          })
          .filter(function (i) { return i.dist <= radiusM; })
          .sort(function (a, b) { return a.dist - b.dist; });
      });
  }

  // ── Clear markers ──────────────────────────────────────────────────────────
  function clearMarkers() {
    placeMarkers.forEach(function (m) { map.removeLayer(m); });
    placeMarkers = [];
  }

  // ── Render panel ───────────────────────────────────────────────────────────
  function renderPanel(results, query) {
    document.getElementById('panel-title').textContent = '"' + query + '"';
    document.getElementById('result-count').textContent = results.length + ' found';
    var list = document.getElementById('panel-list');
    if (!results.length) {
      list.innerHTML = '<div class="panel-empty"><div class="big">😕</div>' +
        '<p><strong>No results found</strong><br>Try a wider radius or different keyword.</p></div>';
      return;
    }
    list.innerHTML = '';
    results.forEach(function (item, i) {
      var parts = item.display_name.split(',');
      var name  = parts[0];
      var addr  = parts.slice(1, 3).join(',').trim();
      var card  = document.createElement('div');
      card.className = 'place-card';
      card.innerHTML =
        '<div class="place-top">' +
          '<div class="place-icon">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ff3b3b" stroke-width="2.5">' +
              '<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>' +
            '</svg>' +
          '</div>' +
          '<div>' +
            '<div class="place-name">' + esc(name) + '</div>' +
            '<div class="place-addr">' + esc(addr || 'Address unavailable') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="place-dist">' +
          '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
            '<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>' +
          '</svg>' +
          fmtDist(item.dist) +
        '</div>';
      card.addEventListener('click', function () { focusResult(i); });
      list.appendChild(card);
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function focusResult(i) {
    var cards = document.querySelectorAll('.place-card');
    cards.forEach(function (c, idx) { c.classList.toggle('active', idx === i); });
    var item = currentResults[i];
    map.flyTo([+item.lat, +item.lon], 17, { duration: 0.8 });
    if (placeMarkers[i]) placeMarkers[i].openPopup();
    if (cards[i]) cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Zoom level for radius ──────────────────────────────────────────────────
  function zoomForRadius(r) {
    if (r <= 500)  return 16;
    if (r <= 1000) return 15;
    if (r <= 2000) return 14;
    if (r <= 5000) return 13;
    return 12;
  }

  // ── Main search ────────────────────────────────────────────────────────────
  function doSearch() {
    var query = document.getElementById('search-input').value.trim();
    if (!query) return;

    var locPromise = userLocation
      ? Promise.resolve(userLocation)
      : getLocation().then(function (loc) { userLocation = loc; return loc; });

    showStatus('Getting your location…', 'loading');

    locPromise
      .then(function (loc) {
        placeUserMarker(loc.lat, loc.lng);
        placeRadiusCircle(loc.lat, loc.lng, currentRadius);
        map.flyTo([loc.lat, loc.lng], zoomForRadius(currentRadius), { duration: 0.9 });
        showStatus('Searching for "' + query + '"…', 'loading');
        return searchNearby(loc.lat, loc.lng, query, currentRadius);
      })
      .then(function (results) {
        currentResults = results;
        clearMarkers();
        results.forEach(function (item, i) {
          var name = item.display_name.split(',')[0];
          var addr = item.display_name.split(',').slice(1, 3).join(',').trim();
          var m = L.marker([+item.lat, +item.lon], { icon: redIcon() })
            .addTo(map)
            .bindPopup(
              '<div class="pname">' + esc(name) + '</div>' +
              '<div class="paddr">' + esc(addr || 'Address unavailable') + '</div>' +
              '<div class="pdist">' + fmtDist(item.dist) + '</div>'
            );
          m.on('click', function () {
            var cards = document.querySelectorAll('.place-card');
            cards.forEach(function (c, idx) { c.classList.toggle('active', idx === i); });
            if (cards[i]) cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          });
          placeMarkers.push(m);
        });
        renderPanel(results, query);
        showStatus(
          results.length ? results.length + ' places found nearby' : 'No places found',
          results.length ? 'ok' : 'error'
        );
      })
      .catch(function (err) {
        console.error(err);
        if (err && err.code === 1) {
          showStatus('Location denied — showing global results', 'error');
          fallbackSearch(query);
        } else {
          showStatus('Something went wrong. Try again.', 'error');
        }
      });
  }

  function fallbackSearch(query) {
    var url = 'https://nominatim.openstreetmap.org/search?q=' +
      encodeURIComponent(query) + '&format=json&limit=10&addressdetails=1';
    fetch(url, { headers: { 'Accept-Language': 'en' } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        clearMarkers();
        currentResults = data.map(function (i) { return Object.assign({}, i, { dist: 0 }); });
        data.forEach(function (item) {
          var m = L.marker([+item.lat, +item.lon], { icon: redIcon() })
            .addTo(map)
            .bindPopup('<div class="pname">' + esc(item.display_name.split(',')[0]) + '</div>');
          placeMarkers.push(m);
        });
        if (data.length) map.flyTo([+data[0].lat, +data[0].lon], 13);
        renderPanel(currentResults, query);
        showStatus(data.length + ' results (no location)', 'ok');
      })
      .catch(function () { showStatus('Search failed', 'error'); });
  }

  // ── Wire up events ─────────────────────────────────────────────────────────
  document.getElementById('btn-search').addEventListener('click', doSearch);

  document.getElementById('search-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doSearch();
  });

  document.getElementById('btn-locate').addEventListener('click', function () {
    if (userLocation) {
      map.flyTo([userLocation.lat, userLocation.lng], zoomForRadius(currentRadius));
    } else {
      getLocation()
        .then(function (loc) {
          userLocation = loc;
          placeUserMarker(loc.lat, loc.lng);
          map.flyTo([loc.lat, loc.lng], 14);
          showStatus('Location found!', 'ok');
        })
        .catch(function () { showStatus('Location access denied', 'error'); });
    }
  });

  document.querySelectorAll('.radius-pill').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.radius-pill').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      currentRadius = parseFloat(btn.dataset.km) * 1000;
      if (userLocation) {
        placeRadiusCircle(userLocation.lat, userLocation.lng, currentRadius);
        map.flyTo([userLocation.lat, userLocation.lng], zoomForRadius(currentRadius));
      }
    });
  });

  document.querySelectorAll('.chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      document.getElementById('search-input').value = chip.dataset.q;
      doSearch();
    });
  });

  // ── Auto-search on load ────────────────────────────────────────────────────
  showStatus('Ready — search a place above', 'ok');
  doSearch();
}
</script>
</body>
</html>
